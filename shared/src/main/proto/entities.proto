syntax = "proto3";

option java_package = "ser460.sundevilconnect.shared.proto";
option java_outer_classname = "EntitiesProto";
option java_multiple_files = false;

enum Role {
  STUDENT = 0;
  CLUB_LEADER = 1;
  ADMIN = 2;
}

message UserSummary {
  string userId = 1;
  string displayName = 2;
}

message Club {
  string clubId = 1;
  string name = 2;
  string description = 3;
  string category = 4;
  string status = 5;
  string foundedDate = 6;
}

message Content {
  string contentId = 1;
  UserSummary createdBy = 2;
  string status = 3;
  bool isFlagged = 4;
  string flagReason = 5;
  oneof content_type {
    Event event = 6;
    Announcement announcement = 7;
  }
}

message Event {
  string eventId = 1;
  string title = 2;
  string description = 3;
  Club hostedBy = 4;
  string eventDate = 5;
  string category = 6;
  string location = 7;
  int32 capacity = 8;
  bool isPaid = 9;
  string status = 10;
}

message Announcement {
  string announcementId = 1;
  string title = 2;
  string body = 3;
  string postedDate = 4;
  Club postedTo = 5;
  UserSummary createdBy = 6;
  string status = 7;
}

message ClubMembership {
  string membershipId = 1;
  UserSummary student = 2;
  Club club = 3;
  string role = 4;
  string joinDate = 5;
  string status = 6;
}