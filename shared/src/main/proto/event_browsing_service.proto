syntax = "proto3";

import "entities.proto";

option java_package = "ser460.sundevilconnect.shared.proto";
option java_outer_classname = "EventBrowsingServiceProto";
option java_multiple_files = false;

enum FilterType {
    DATE = 0;
    CATEGORY = 1;
    PAID = 2;
    CLUB = 3;
}

service EventBrowsingService {
  rpc GetAllEvents(GetAllEventsRequest) returns (EventListResponse);
  rpc GetEventsByCategory(GetEventsByCategoryRequest) returns (EventListResponse);
  rpc SearchEvents(SearchEventsRequest) returns (EventListResponse);
  rpc GetEventDetails(GetEventDetailsRequest) returns (EventDetailsResponse);
  rpc GetFilteredEvents(GetFilteredEventsRequest) returns (EventListResponse);
}

message GetAllEventsRequest {}

message GetEventsByCategoryRequest {
  string category = 1;
}

message SearchEventsRequest {
  string keyword = 1;
}

message GetEventDetailsRequest {
  string eventId = 1;
}

message GetFilteredEventsRequest {
  repeated EventFilter filters = 1;
}

message EventFilter {
  FilterType type = 1;
  oneof filter_data {
    DateFilter date = 2;
    CategoryFilter category = 3;
    PaidFilter paid = 4;
    ClubFilter club = 5;
  }
}

message DateFilter {
  string fromDate = 1;
  string toDate = 2;
}

message CategoryFilter {
  string category = 1;
}

message PaidFilter {
  bool isPaid = 1;
}

message ClubFilter {
  string clubId = 1;
}

message EventListResponse {
  repeated Event events = 1;
}

message EventDetailsResponse {
  Event event = 1;
}