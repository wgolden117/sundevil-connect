syntax = "proto3";

import "entities.proto";

option java_package = "ser460.sundevilconnect.shared.proto";
option java_outer_classname = "AuthServiceProto";
option java_multiple_files = false;

service AuthService {
  // add rpc calls for each server-side request made by a client
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
}

// example messages
message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  bool success = 1;
  UserSummary user = 2;
  string token = 3;
  string role = 4;
}

message LogoutRequest {
  string userId = 1;
  string token = 2;
}

message LogoutResponse {
  bool success = 1;
}