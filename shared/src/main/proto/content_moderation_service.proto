syntax = "proto3";

import "entities.proto";

option java_package = "ser460.sundevilconnect.shared.proto";
option java_outer_classname = "ContentModerationServiceProto";
option java_multiple_files = false;

service ContentModerationService {
  rpc FlagContent(FlagContentRequest) returns (ContentActionResponse);
  rpc ApproveFlaggedContent(ApproveFlaggedContentRequest) returns (ContentActionResponse);
  rpc RemoveFlaggedContent(RemoveFlaggedContentRequest) returns (ContentActionResponse);
  rpc GetFlaggedContent(GetFlaggedContentRequest) returns (GetFlaggedContentResponse);
  rpc GetContentFlagStatus(GetContentFlagStatusRequest) returns (GetContentFlagStatusResponse);
}

message FlagContentRequest {
  string contentId = 1;
  string reason = 2;
  string userId = 3;
  string eventId = 4;
  string announcementId = 5;
}

message ApproveFlaggedContentRequest {
  string contentId = 1;
}

message RemoveFlaggedContentRequest {
  string contentId = 1;
}

message GetFlaggedContentRequest {}

message GetContentFlagStatusRequest {
  string contentId = 1;
  string eventId = 2;
  string announcementId = 3;
}


message ContentActionResponse {
  bool success = 1;
}

message GetFlaggedContentResponse {
  repeated Content flaggedContent = 1;
}

message GetContentFlagStatusResponse {
  bool isFlagged = 1;
}