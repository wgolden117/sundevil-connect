syntax = "proto3";
option java_package = "ser460.sundevilconnect.shared.proto";
option java_outer_classname = "AuthProto";

// TODO: define messages as implementation progresses

// examples
message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  bool success = 1;
  string userId = 2;
  string token = 3;
  string role = 4;
}